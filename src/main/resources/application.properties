# ──────────────────────────────────────────────
# Application
# ──────────────────────────────────────────────
spring.application.name=EM_Backend
server.port=8080

# ──────────────────────────────────────────────
# Database (MySQL) — all sourced from env vars
# ──────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:eventmanager}?createDatabaseIfNotExist=true&useSSL=${DB_SSL:false}&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ──────────────────────────────────────────────
# JPA / Hibernate
# ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ──────────────────────────────────────────────
# JWT
# ──────────────────────────────────────────────
jwt.secret=${JWT_SECRET:changeme_replace_with_a_very_long_random_string_in_production}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ──────────────────────────────────────────────
# Default Admin Account
# ──────────────────────────────────────────────
admin.default.email=${ADMIN_EMAIL:admin@eventmanager.com}
admin.default.password=${ADMIN_PASSWORD:Admin@123}
admin.default.first-name=${ADMIN_FIRST_NAME:System}
admin.default.last-name=${ADMIN_LAST_NAME:Admin}

# ──────────────────────────────────────────────
# Jackson — serialize LocalDateTime as ISO-8601
# ──────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
# NOTE: Do NOT set spring.jackson.default-property-inclusion=NON_NULL
# globally — it strips null values from GraphQL responses, violating
# the GraphQL spec and causing Apollo Client cache write errors.
# Use @JsonInclude(NON_NULL) on individual REST DTOs instead.
